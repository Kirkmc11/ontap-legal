<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Tap — Legal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f7ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 48px; max-width: 440px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .logo-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #4599fa, #2b7de9); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 16px; }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 32px; font-size: 15px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-btn { display: block; padding: 14px 20px; background: #f0f7ff; border-radius: 12px; color: #4599fa; font-weight: 600; font-size: 15px; text-decoration: none; transition: background 0.2s; }
        .link-btn:hover { background: #ddeeff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-icon">💧</div>
        <h1>On Tap</h1>
        <p>Track what you drink, every day.</p>
        <div class="links">
            <a href="privacy.html" class="link-btn">🔒 Privacy Policy</a>
            <a href="terms.html" class="link-btn">📋 Terms &amp; Conditions</a>
        </div>
    </div>
</body>
</html>
